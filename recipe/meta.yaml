{% set python_min = "3.12" %}
{% set python_max = "3.13" %}
{% set version = "1.9" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:

  url: https://pypi.io/packages/source/f/flexsweep/flexsweep-{{ version }}.tar.gz
  sha256: <update_after_pypi_upload>

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.12,<3.13
    - pip
    - uv_build >=0.9.28,<0.10.0
    - git
    - make
    - gcc
    - rust
  run:
    - python >=3.12,<3.13
    - tensorflow >=2.18.0,<3
    - scipy >=1.14.0,<2
    - scikit-allel >=1.3.8,<2
    - scikit-learn >=1.5.1,<2
    - joblib >=1.4.2,<2
    - threadpoolctl >=3.5.0,<4
    - click >=8.1.7,<9
    - numpy ==1.26.4
    - numba >=0.60.0,<0.61
    - demes >=0.2.3,<0.3
    - pyarrow >=21.0.0,<22
    - matplotlib-base >=3.9.2,<4
    - polars >=1.14.0,<2
    - polars-bio >=0.20.1,<1
    - tbb >=2022.1.0,<2023
    - tqdm >=4.67.1,<5

test:
  imports:
    - flexsweep
  commands:
    - flexsweep --help
    - discoal || true
    - polarize --help || true
  requires:
    - pip

about:
  home: https://github.com/jmurga/flexsweep
  summary: 'A versatile tool for detecting selective sweeps'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jmurga
