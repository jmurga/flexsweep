# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install uv
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      # Ensure uv is in the PATH for subsequent commands
      - export PATH="$HOME/.cargo/bin:$PATH"
    post_install:
      # Use uv to sync dependencies
      # --no-dev ensures you don't waste time on test/lint tools
      # --group docs (or whatever your group is named) installs doc-specific tools
      - $HOME/.cargo/bin/uv sync --group docs
      # If you need to install the current project in editable mode:
      - $HOME/.cargo/bin/uv pip install -e .

sphinx:
  configuration: docs/conf.py

formats:
  - pdf
