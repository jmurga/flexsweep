version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install uv
      - curl -LsSf https://astral.sh/uv/install.sh | sh
    post_install:
      - /home/docs/.local/bin/uv pip install .[docs]
      - /home/docs/.local/bin/uv pip install "sphinx-rtd-theme"
sphinx:
  configuration: docs/conf.py

formats:
  - pdf

